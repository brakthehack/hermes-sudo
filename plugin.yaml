name: hermes-sudo
version: 1.0.0
description: "Secure ephemeral sudo access via system PAM authentication. Default: authorize one command only. Supports session-scoped authorization. Uses sudo -v to prompt on /dev/tty — passwords are never exposed to the agent."
author: "hermes-sudo"
kind: standalone
provides_tools:
  - sudo_authorize
hooks:
  - pre_tool_call
  - post_tool_call
  - on_session_end
